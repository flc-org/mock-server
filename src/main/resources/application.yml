spring:
  application:
    name: mock-server
  datasource:
    url: jdbc:h2:file:./mock-server-db/mockdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8099

mock-server:
  hosts:
    ueqsHost: https://www.ueqs.com
