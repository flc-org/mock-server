server:
  port: 8099

mock-server:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/mock-server;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      pool-name: mock-server-hikari

spring:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
